<!DOCTYPE html>
<html lang="en-IE">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- Served by Vercel at egr.ie/survey (no trailing slash); base makes all
       relative asset paths resolve to /survey/… correctly. -->
  <base href="/survey/" />

  <!-- ============================================================
       Google Tag Manager + Consent Mode v2  (GDPR cookie gating)
       Copied verbatim from the rest of egr.ie so /survey gates consent
       identically. Google tags fire via this GTM container on the
       "consent_accepted" trigger / Consent Mode; the Meta Pixel is loaded
       further down, consent-gated, exactly as on the other pages —
       nothing non-essential fires before accept.
       ============================================================ -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    // Default: deny all non-essential storage until the user accepts.
    gtag('consent', 'default', {
      ad_storage: 'denied', analytics_storage: 'denied',
      ad_user_data: 'denied', ad_personalization: 'denied',
      functionality_storage: 'granted', security_storage: 'granted'
    });
    // Restore a prior ACCEPT before GTM loads.
    try {
      if (localStorage.getItem('egr-cookie-consent') === 'accepted') {
        gtag('consent', 'update', {
          ad_storage: 'granted', analytics_storage: 'granted',
          ad_user_data: 'granted', ad_personalization: 'granted'
        });
        dataLayer.push({ event: 'consent_accepted' });
      }
    } catch (e) {}
  </script>
  <!-- GTM container loader -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-PV2NXGDJ');</script>
  <!-- End Google Tag Manager -->

  <title>Get your free solar quote — EGR Solar</title>
  <meta name="description" content="Answer a few quick questions and get your free EGR solar quote. SEAI grant & 0% VAT fully handled. Serving Munster & South Leinster." />
  <meta name="robots" content="noindex" />

  <link rel="icon" href="assets/egr-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Cookie consent bar — styles copied verbatim from egr.ie pages (with the
       CSS variables they depend on) so the banner looks identical here. -->
  <style>
    :root {
      --color-forest: #1F5400;
      --color-white: #FFFFFF;
      --color-cta: #F4A024;
      --color-cta-hover: #E08E10;
      --color-text: #1A1A1A;
      --rgb-white: 255, 255, 255;
      --radius-lg: 22px;
      --radius-pill: 9999px;
    }
    /* ===== cookie consent bar (GDPR) ===== */
    .cookie-bar { position: fixed; left: 1rem; right: 1rem; bottom: 1rem; z-index: 1000; max-width: 64rem; margin-inline: auto; background: var(--color-forest); color: var(--color-white); border-radius: var(--radius-lg); box-shadow: 0 12px 44px rgba(0,0,0,0.28); padding: clamp(1rem, 2.5vw, 1.4rem) clamp(1.1rem, 3vw, 1.6rem); display: flex; flex-wrap: wrap; align-items: center; gap: 0.9rem 1.5rem; }
    .cookie-bar[hidden] { display: none; }
    .cookie-bar-text { margin: 0; flex: 1 1 22rem; font-size: 0.92rem; line-height: 1.55; color: rgba(var(--rgb-white), 0.92); }
    .cookie-bar-text a { color: var(--color-white); text-decoration: underline; }
    .cookie-bar-actions { display: flex; gap: 0.7rem; flex: 0 0 auto; }
    .cookie-bar button { font: inherit; font-weight: 600; cursor: pointer; border-radius: var(--radius-pill); padding: 0.6rem 1.25rem; border: 1px solid transparent; transition: background 0.2s var(--ease), border-color 0.2s var(--ease), color 0.2s var(--ease); }
    .cookie-accept { background: var(--color-cta); color: var(--color-text); }
    .cookie-accept:hover { background: var(--color-cta-hover); }
    .cookie-reject { background: transparent; color: var(--color-white); border-color: rgba(var(--rgb-white), 0.45); }
    .cookie-reject:hover { border-color: var(--color-white); background: rgba(var(--rgb-white), 0.08); }
    @media (max-width: 560px) {
      .cookie-bar { padding: 0.85rem 0.95rem; gap: 0.6rem 1rem; left: 0.6rem; right: 0.6rem; bottom: 0.6rem; }
      .cookie-bar-text { font-size: 0.82rem; line-height: 1.45; flex-basis: 100%; }
      .cookie-bar-actions { width: 100%; }
      .cookie-bar-actions button { flex: 1; }
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PV2NXGDJ" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div class="app">
    <header class="app-header">
      <div class="app-header__bar">
        <button class="back-btn" id="backBtn" type="button" hidden aria-label="Go back to the previous question">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
          <span>Back</span>
        </button>
        <div class="app-header__spacer"></div>
        <img class="app-header__logo" src="assets/egr-logo.png" alt="EGR Solar — Eco Green Resources" />
      </div>
      <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Survey progress">
        <div class="progress__fill" id="progressFill"></div>
      </div>
      <span class="progress__label" id="progressLabel">Step 1</span>
    </header>

    <main class="stage" id="stage" aria-live="polite">
      <!-- Steps are rendered here by js/quiz.js -->
    </main>
  </div>

  <!-- ===== Cookie consent bar (GDPR) — banner + logic (incl. consent-gated
       Meta Pixel) copied verbatim from egr.ie pages. ===== -->
  <div class="cookie-bar" id="cookieBar" role="dialog" aria-live="polite" aria-label="Cookie consent" hidden>
    <p class="cookie-bar-text">We use essential cookies to make this site work. With your consent we also use analytics and marketing cookies to improve the site and measure our advertising. See our <a href="/cookie-policy">Cookie Policy</a>.</p>
    <div class="cookie-bar-actions">
      <button type="button" class="cookie-reject" id="cookieReject">Necessary only</button>
      <button type="button" class="cookie-accept" id="cookieAccept">Accept all</button>
    </div>
  </div>
  <script>
    (function () {
      var KEY = 'egr-cookie-consent';
      var META_PIXEL_ID = '892188746369776';
      var bar = document.getElementById('cookieBar');
      function hide(){ if (bar) bar.hidden = true; }
      // Meta Pixel — consent-gated: the fbevents.js loader is injected and fbq init + PageView
      // run ONLY here, after Accept (or on a later visit where 'accepted' is already stored).
      // Nothing Meta-related touches the page before consent. Runs once per page.
      function fireMetaPixel(){
        if (window._egrMetaPixelLoaded) return;
        window._egrMetaPixelLoaded = true;
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', META_PIXEL_ID);
        fbq('track', 'PageView');
        if (window.EGR_PIXEL_LEAD) { fbq('track', 'Lead'); }   // per-page opt-in (e.g. thank-you): same consent gate + once-guard
      }
      function accept(){
        try { localStorage.setItem(KEY, 'accepted'); } catch (e) {}
        if (typeof gtag === 'function') {
          gtag('consent', 'update', { ad_storage:'granted', analytics_storage:'granted', ad_user_data:'granted', ad_personalization:'granted' });
        }
        window.dataLayer = window.dataLayer || [];
        dataLayer.push({ event: 'consent_accepted' });   // consent signal for any GTM-managed tags
        fireMetaPixel();                                  // Meta Pixel: load + PageView now (first acceptance)
        hide();
      }
      function reject(){
        try { localStorage.setItem(KEY, 'rejected'); } catch (e) {}
        hide();   // consent stays denied — nothing non-essential fires
      }
      var stored = null;
      try { stored = localStorage.getItem(KEY); } catch (e) {}
      if (!stored && bar) { bar.hidden = false; }   // show on first visit only
      if (stored === 'accepted') { fireMetaPixel(); }   // returning visitor already consented - fire on load
      var a = document.getElementById('cookieAccept'), r = document.getElementById('cookieReject');
      if (a) a.addEventListener('click', accept);
      if (r) r.addEventListener('click', reject);
    })();
  </script>

  <script src="js/quiz.js" defer></script>
</body>
</html>
